workflows:
  ios-unsigned-device-ipa:
    name: iOS unsigned device IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        PROJECT_PATH: src/MeterRecti.Native/MeterRecti.Native.csproj
        OUTPUT_DIR: build/ios
    scripts:
      - name: Install .NET SDK
        script: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --channel 9.0 --install-dir "$HOME/.dotnet"
          echo "DOTNET_ROOT=$HOME/.dotnet" >> "$CM_ENV"
          echo "PATH=$HOME/.dotnet:$PATH" >> "$CM_ENV"
      - name: Show .NET info
        script: dotnet --info
      - name: Install MAUI workload
        script: dotnet workload install maui ios
      - name: Restore
        script: dotnet restore "$PROJECT_PATH"
      - name: Publish unsigned iOS app
        script: |
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          PROJECT_DIR="$(dirname "$PROJECT_PATH")"
          dotnet build "$PROJECT_PATH" \
            -f net9.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:EnableCodeSigning=false \
            -p:BuildIpa=false \
            -p:ArchiveOnBuild=false

          APP_PATH="$(find "$PROJECT_DIR/bin/Release/net9.0-ios/ios-arm64" "$OUTPUT_DIR" -name "*.app" -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle was produced."
            echo "Project output:"
            find "$PROJECT_DIR/bin/Release/net9.0-ios/ios-arm64" -maxdepth 5 -print || true
            echo "Workflow output:"
            find "$OUTPUT_DIR" -maxdepth 5 -print || true
            exit 1
          fi

          echo "Packaging app bundle: $APP_PATH"
          INFO_PLIST="$APP_PATH/Info.plist"
          BUNDLE_ID="$(plutil -extract CFBundleIdentifier raw -o - "$INFO_PLIST")"
          EXECUTABLE="$(plutil -extract CFBundleExecutable raw -o - "$INFO_PLIST")"
          DISPLAY_NAME="$(plutil -extract CFBundleDisplayName raw -o - "$INFO_PLIST" 2>/dev/null || plutil -extract CFBundleName raw -o - "$INFO_PLIST")"
          echo "Bundle ID: $BUNDLE_ID"
          echo "Display name: $DISPLAY_NAME"
          echo "Executable: $EXECUTABLE"
          file "$APP_PATH/$EXECUTABLE"
          lipo -info "$APP_PATH/$EXECUTABLE"
          if [ "$BUNDLE_ID" != "com.meterrecti.native" ]; then
            echo "Unexpected bundle id: $BUNDLE_ID"
            exit 1
          fi

          mkdir -p "$OUTPUT_DIR/Payload"
          cp -R "$APP_PATH" "$OUTPUT_DIR/Payload/"
          (cd "$OUTPUT_DIR" && zip -qry MeterRecti-unsigned-device.ipa Payload)
    artifacts:
      - build/ios/**/*.ipa
      - build/ios/**/*.app
